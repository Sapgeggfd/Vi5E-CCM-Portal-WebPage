<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestLogin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="forms.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="glassContainer">
        <form class="styledForm">
            <div class="styledFields">
                <label for="signupUsername">Username</label>
                <input class="glassContainer" id="signupUsername" type="text">

                <label for="signupEmail">E-Mail</label>
                <input class="glassContainer" id="signupEmail" type="email">

                <label for="signupPassword">Password</label>
                <input class="glassContainer" id="signupPassword" type="password">

                <label for="signupPasswordConfirm">Confirm Password</label>
                <input class="glassContainer" id="signupPasswordConfirm" type="password">

                <button class="glassContainer" type="submit">SignUP</button>
            </div>

            <span>You already have an Account?</span>
            <span> Login<a class="styledLink" href="/login.html">here</a></span>
        </form>
    </div>
</body>

</html>
